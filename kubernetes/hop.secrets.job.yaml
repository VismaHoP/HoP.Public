# hop.secrets.job — initialises / rotates HoP secrets.
#
# Run order:
#   1. kubectl apply -f pg_ecr.yaml          (postgres)
#   2. kubectl apply -f h2o.app.database.yaml (DB migrations + seed data)
#   3. Wait until database pod is Ready (readiness probe passes = migrations done):
#      kubectl wait --for=condition=ready pod -l app=database --timeout=300s
#   4. kubectl apply -f hop.secrets.job.yaml  (generates secrets + syncs DB)
#   5. Wait until Job completes:  kubectl wait --for=condition=complete job/hop-secrets-init
#   6. kubectl apply -k .                     (start all microservices)
#
# On upgrade, simply re-apply this file before redeploying the services.
# The Job is idempotent — it rotates all secrets and re-encrypts DB rows.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hop-secrets-job
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hop-secrets-manager
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hop-secrets-manager
subjects:
  - kind: ServiceAccount
    name: hop-secrets-job
roleRef:
  kind: Role
  name: hop-secrets-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: hop-secrets-init
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: hop-secrets-job
      restartPolicy: OnFailure
      containers:
        - name: secrets-init
          image: ${registryURL}/hop.k8s.secrets:1
          env:
            - name: PG_CONNECTION_STRING
              valueFrom:
                configMapKeyRef:
                  name: hop-secrets-job
                  key: PgConnectionString
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hop-secrets-job
data:
  PgConnectionString: 'Server=postgres;Port=5432;User Id=h2ouser;Password=h2ouser;Database=h2o'
