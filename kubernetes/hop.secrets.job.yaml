# hop.secrets.job — initialises / rotates HoP secrets.
#
# Run order:
#   1. kubectl apply -f pg_ecr.yaml          (postgres)
#   2. kubectl apply -f h2o.app.database.yaml (DB migrations + seed data)
#   3. Wait until database pod is Ready (readiness probe passes = migrations done):
#      kubectl wait --for=condition=ready pod -l app=database --timeout=300s
#   4. kubectl apply -f hop.secrets.job.yaml  (generates secrets + syncs DB)
#   5. Wait until Job completes:  kubectl wait --for=condition=complete job/hop-secrets-init
#   6. kubectl apply -k .                     (start all microservices)
#
# On upgrade, simply re-apply this file before redeploying the services.
# The Job is idempotent — it rotates all secrets and re-encrypts DB rows.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hop-secrets-job
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hop-secrets-manager
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "update", "patch"]
    resourceNames:
      - hop-secrets-gateway
      - hop-secrets-auth
      - hop-secrets-database
      - hop-secrets-ftg
      - hop-secrets-licence
      - hop-secrets-menu
      - hop-secrets-webrouter
      - hop-secrets-elmar
      - hop-secrets-antra
      - hop-secrets-image
      - hop-secrets-feedback
      - hop-secrets-settings
      - hop-secrets-absencecalendar
      - hop-secrets-attachment
      - hop-secrets-clientapplications
      - hop-secrets-department
      - hop-secrets-freeform
      - hop-secrets-horcalendar
      - hop-secrets-metainvoicelist
      - hop-secrets-metainvoicesubmit
      - hop-secrets-payslip
      - hop-secrets-persondata
      - hop-secrets-report
      - hop-secrets-staff
      - hop-secrets-task
      - hop-secrets-taskmetainvoice
      - hop-secrets-taskhomeinventory
      - hop-secrets-vacation
      - hop-secrets-antralicense
      - hop-secrets-extappadmin
      - hop-secrets-payout
      - hop-secrets-matreslist
      - hop-secrets-taskmatres
      - hop-secrets-contract
      - hop-secrets-horweb
      - hop-secrets-businesstrip
      - hop-secrets-stockwriteoff
      - hop-secrets-worktimeplanning
      - hop-secrets-worktimetracking
      - hop-secrets-advanceexpense
      - hop-secrets-training
      - hop-secrets-ocr
      - hop-secrets-workplace
      - hop-secrets-notification
      - hop-secrets-einventory
      - hop-secrets-mhe
      - hop-secrets-order
      - hop-secrets-acquaint
      - hop-secrets-hrreport
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hop-secrets-manager
subjects:
  - kind: ServiceAccount
    name: hop-secrets-job
roleRef:
  kind: Role
  name: hop-secrets-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: hop-secrets-init
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: hop-secrets-job
      restartPolicy: OnFailure
      containers:
        - name: hop-secrets-job
          image: ${registryURL}/hop.k8s.secrets:1
          env:
            - name: PG_CONNECTION_STRING
              valueFrom:
                configMapKeyRef:
                  name: hop-secrets-job
                  key: PgConnectionString
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hop-secrets-job
data:
  PgConnectionString: ''
